name: Lint & Format

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "**.swift"
      - ".swiftlint.yml"
      - ".swiftformat"
      - ".github/workflows/lint.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.swift"
      - ".swiftlint.yml"
      - ".swiftformat"
      - ".github/workflows/lint.yml"

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-26
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Cache Homebrew
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            /usr/local/Homebrew
            ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-swiftlint

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: |
          swiftlint lint --strict --reporter github-actions-logging

  swiftformat:
    name: SwiftFormat
    runs-on: macos-26
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Cache Homebrew
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            /usr/local/Homebrew
            ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-swiftformat

      - name: Install SwiftFormat
        run: |
          brew install swiftformat
          swiftformat --version

      - name: Check formatting
        run: |
          swiftformat --lint . 2>&1 || {
            echo "::error::Code is not formatted. Run 'swiftformat .' locally and commit the changes."
            exit 1
          }
